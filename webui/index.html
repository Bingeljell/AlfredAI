<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alfred</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ui/styles.css">
</head>
<body>
  <div class="app-shell" id="app-shell">

    <aside class="sidebar">
      <div class="brand">
        <span class="brand-orb" id="brand-orb"></span>
        <span class="brand-wordmark">Alfred</span>
      </div>

      <div class="session-list-wrap">
        <div class="section-label">Sessions</div>
        <div class="session-list" id="session-list"></div>
      </div>

      <div class="sidebar-footer">
        <button class="new-session-btn" id="new-session-btn">+ New session</button>
        <div class="sidebar-nav">
          <button class="snav-item" id="nav-debug">Debug</button>
          <button class="snav-item" id="nav-settings">Settings</button>
        </div>
      </div>
    </aside>

    <main class="chat-col">
      <div class="chat-topbar">
        <div class="topbar-left">
          <span class="active-session-name" id="active-session-name">—</span>
          <span class="channel-badge hidden" id="channel-badge"></span>
        </div>
        <div class="topbar-right">
          <span class="token-badge hidden" id="session-tokens-badge"></span>
          <span class="status-pill" id="run-status-pill">idle</span>
          <button class="ghost-btn" id="reset-ctx-btn" title="Reset context">/new</button>
          <button class="ghost-btn accent-btn" id="debug-open-btn">Debug ↗</button>
        </div>
      </div>

      <div class="chat-messages" id="chat-history"></div>

      <div class="artifacts-strip hidden" id="artifacts-strip">
        <span class="artifacts-label">Artifacts</span>
        <div class="artifact-chips" id="artifact-chips"></div>
        <button class="ghost-btn" id="export-current-run">Export run</button>
      </div>

      <div class="composer-wrap">
        <textarea id="message" placeholder="Message Alfred…  (Enter to send · Shift+Enter for new line)" rows="3"></textarea>
        <button class="send-btn" id="send">
          <span class="send-label">Run Alfred</span>
        </button>
      </div>
    </main>

    <aside class="debug-drawer" id="debug-drawer">
      <div class="drawer-topbar">
        <div class="drawer-tabs" id="drawer-tabs">
          <button class="dtab active" data-tab="inspector">Live</button>
          <button class="dtab" data-tab="telemetry">Telemetry</button>
          <button class="dtab" data-tab="status">Status</button>
          <button class="dtab" data-tab="settings">Config</button>
        </div>
        <button class="ghost-btn" id="debug-close-btn">✕</button>
      </div>

      <div class="drawer-body">
        <div class="dpane active" id="dpane-inspector">
          <div class="dinspect-header">
            <span class="status-pill" id="inspector-run-status">idle</span>
            <div class="live-pulse" id="live-pulse"></div>
          </div>
          <div class="dinspect-section">
            <div class="dinspect-label">Model trace</div>
            <div class="event-feed" id="thought-feed"></div>
          </div>
          <div class="dinspect-section">
            <div class="dinspect-label">Tool calls</div>
            <div class="event-feed" id="tool-feed"></div>
          </div>
          <div class="dinspect-section">
            <div class="dinspect-label">Budget</div>
            <div class="metric-grid" id="budget-grid"></div>
          </div>
          <div class="dinspect-section">
            <div class="dinspect-label">Run controls</div>
            <div class="run-ctl-row">
              <input id="run-id-input" type="text" placeholder="Paste run ID" />
              <button class="ghost-btn" id="load-run">Load</button>
            </div>
            <div class="run-ctl-row" style="margin-top:8px">
              <button class="ghost-btn" id="cancel-run">Cancel run</button>
              <button class="ghost-btn" id="export-run">Export JSON</button>
            </div>
          </div>
        </div>

        <div class="dpane" id="dpane-telemetry">
          <div class="telem-filter-row">
            <input id="telemetry-filter" type="text" placeholder="Filter by run id or message" />
            <button class="ghost-btn" id="refresh-runs">Refresh</button>
          </div>
          <div class="telemetry-runs" id="telemetry-runs"></div>
          <div class="telem-console-bar">
            <button class="ghost-btn active" id="telemetry-format">Formatted</button>
            <button class="ghost-btn" id="telemetry-raw">Raw JSON</button>
            <button class="ghost-btn" id="telemetry-export">Export</button>
          </div>
          <div class="telem-meta" id="telemetry-meta"></div>
          <div class="telem-console" id="telemetry-console"></div>
        </div>

        <div class="dpane" id="dpane-status">
          <div class="dstatus-section">
            <div class="dinspect-label">LLM provider</div>
            <div id="status-llm-card" class="dstatus-body"></div>
          </div>
          <div class="dstatus-section">
            <div class="dinspect-label">Search providers</div>
            <div id="status-provider-card" class="dstatus-body"></div>
          </div>
          <div class="dstatus-section">
            <div class="dinspect-label">Sessions</div>
            <div id="status-session-card" class="dstatus-body"></div>
          </div>
          <div class="dstatus-section">
            <div class="dinspect-label">Channels</div>
            <div id="status-channel-card" class="dstatus-body"></div>
          </div>
        </div>

        <div class="dpane" id="dpane-settings">
          <div class="dstatus-section">
            <div class="dinspect-label">Browser config</div>
            <div id="settings-ui-card" class="dstatus-body"></div>
          </div>
        </div>
      </div>
    </aside>

  </div>

  <div class="modal-backdrop hidden" id="modal-backdrop">
    <div class="modal glass-panel">
      <div class="modal-title">New session</div>
      <input id="session-name" type="text" placeholder="Name (optional)" />
      <div class="modal-footer">
        <button class="ghost-btn" id="modal-cancel">Cancel</button>
        <button class="primary-btn" id="modal-confirm">Create</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="/ui/app.js"></script>
</body>
</html>
